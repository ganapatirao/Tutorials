<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Resume Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.2.2/build/index.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="templates.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #1a1a2e;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #667eea 75%, #764ba2 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            min-height: 100vh;
            padding: 30px 20px;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 400px 1fr 320px;
            gap: 20px;
            position: relative;
        }
        
        .sidebar-toggle {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            font-size: 24px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .sidebar-toggle:hover {
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }
        
        .layout-toggle {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(240, 147, 251, 0.4);
            font-size: 24px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .layout-toggle:hover {
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 12px 35px rgba(240, 147, 251, 0.5);
        }
        
        .sidebar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
            height: fit-content;
            position: sticky;
            top: 20px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            transition: all 0.3s ease;
        }
        
        .sidebar.collapsed {
            width: 0;
            padding: 0;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
        }
        
        .sidebar.expanded {
            width: 400px;
            padding: 25px;
            opacity: 1;
            pointer-events: auto;
        }
        
        .right-sidebar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
            height: fit-content;
            position: sticky;
            top: 20px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            transition: all 0.3s ease;
        }
        
        .right-sidebar.collapsed {
            width: 0;
            padding: 0;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
        }
        
        .right-sidebar.expanded {
            width: 320px;
            padding: 25px;
            opacity: 1;
            pointer-events: auto;
        }
        
        .right-sidebar h3 {
            font-size: 18px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .layout-grid .layout-btn {
            padding: 12px 8px;
            font-size: 11px;
            text-align: center;
        }
        
        .save-load-btns {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .save-load-btns button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .save-load-btns button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
        }
        
        .quick-select {
            background: linear-gradient(135deg, #f8f9ff 0%, #fff 100%);
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
        }
        
        .quick-select h3 {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #1a1a2e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .quick-select .form-group {
            margin-bottom: 12px;
        }
        
        .quick-select .form-group:last-child {
            margin-bottom: 0;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .accordion-section {
            margin-bottom: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .accordion-section.active {
            border-color: #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.1);
        }
        
        .accordion-header {
            padding: 14px 16px;
            background: linear-gradient(135deg, #f8f9ff 0%, #fff 100%);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }
        
        .accordion-header:hover {
            background: linear-gradient(135deg, #f0f4ff 0%, #f8f9ff 100%);
        }
        
        .accordion-header .icon {
            font-size: 18px;
            margin-right: 10px;
        }
        
        .accordion-header .arrow {
            transition: transform 0.3s ease;
            font-size: 12px;
        }
        
        .accordion-section.active .accordion-header .arrow {
            transform: rotate(180deg);
        }
        
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: white;
        }
        
        .accordion-section.active .accordion-content {
            max-height: 2000px;
        }
        
        .accordion-content-inner {
            padding: 16px;
        }
        
        .add-btn {
            width: 100%;
            padding: 12px;
            border: 2px dashed #667eea;
            background: linear-gradient(135deg, #f8f9ff 0%, #fff 100%);
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .add-btn:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        
        .entry-list {
            margin-bottom: 15px;
        }
        
        .entry-item {
            background: #f8f9ff;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            position: relative;
        }
        
        .entry-item .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 6px;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .entry-item .remove-btn:hover {
            background: #ff6b81;
            transform: scale(1.1);
        }
        
        .entry-item input,
        .entry-item textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 10px;
            font-family: inherit;
        }
        
        .entry-item input:last-child,
        .entry-item textarea:last-child {
            margin-bottom: 0;
        }
        
        .entry-item input:focus,
        .entry-item textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .sidebar::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            border-radius: 24px;
            z-index: -1;
            opacity: 0.2;
            filter: blur(10px);
        }
        
        .sidebar {
            position: relative;
        }
        
        .preview-area {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25);
            overflow: auto;
        }
        
        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a2e;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #f8f9ff 0%, #fff 100%);
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }
        
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .entry-list {
            margin-bottom: 20px;
        }
        
        .entry-item {
            background: linear-gradient(135deg, #f8f9ff 0%, #fff 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            position: relative;
        }
        
        .entry-item .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        
        .add-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .save-load-btns {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .save-load-btns button {
            flex: 1;
            padding: 12px;
            border: 2px solid #667eea;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .save-load-btns button:hover {
            background: #667eea;
            color: white;
        }
        
        .download-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        .download-btn {
            flex: 1;
            padding: 18px 25px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 800;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        
        .download-btn.word {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .download-btn.pdf {
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d2d 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(26, 26, 46, 0.4);
        }
        
        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.3);
        }
        
        .download-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }
        
        .download-btn:hover::before {
            left: 100%;
        }
        
        .preview-header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 3px solid #e0e0e0;
        }
        
        .preview-header h2 {
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            margin: 0;
        }
        
        .layout-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            max-height: 100px;
            overflow-y: auto;
            padding: 10px;
            background: #f8f9ff;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
        }
        
        .layout-selector::-webkit-scrollbar {
            width: 6px;
        }
        
        .layout-selector::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }
        
        .layout-btn {
            padding: 10px 18px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .layout-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
        }
        
        .layout-btn:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        #resume-preview {
            width: 100%;
            max-width: 210mm;
            margin: 0 auto;
        }
        
        .quick-select {
            background: linear-gradient(135deg, #f8f9ff 0%, #fff 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 2px solid #e0e0e0;
        }
        
        .quick-select h3 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #1a1a2e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .quick-select .form-group {
            margin-bottom: 15px;
        }
        
        @media (max-width: 1400px) {
            .container {
                grid-template-columns: 350px 1fr 280px;
            }
        }
        
        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: static;
            }
            .right-sidebar {
                position: static;
            }
        }
    </style>
</head>
<body>
    <button class="sidebar-toggle" onclick="toggleSidebar()" id="sidebarToggle">☰</button>
    <button class="layout-toggle" onclick="toggleLayoutSidebar()" id="layoutToggle">🎨</button>
    
    <div class="container">
        <div class="sidebar expanded" id="sidebar">
            <h2>🎨 Resume Builder</h2>
            
            <div class="save-load-btns">
                <button onclick="saveResume()">💾 Save</button>
                <button onclick="loadResume()">📂 Load</button>
            </div>
            
            <div class="quick-select">
                <h3>⚡ Quick Start</h3>
                <div class="form-group">
                    <label for="role-select">Role</label>
                    <select id="role-select" onchange="loadTemplateData()">
                        <option value="">Choose role...</option>
                        <option value="softwareEngineer">Software Engineer</option>
                        <option value="devOpsEngineer">DevOps Engineer</option>
                        <option value="dataScientist">Data Scientist</option>
                        <option value="cybersecurityAnalyst">Cybersecurity Analyst</option>
                        <option value="projectManager">Project Manager</option>
                        <option value="businessAnalyst">Business Analyst</option>
                        <option value="hrManager">HR Manager</option>
                        <option value="financialAnalyst">Financial Analyst</option>
                        <option value="salesManager">Sales Manager</option>
                        <option value="marketingManager">Marketing Manager</option>
                        <option value="healthcareAdministrator">Healthcare Administrator</option>
                        <option value="educationAdministrator">Education Administrator</option>
                        <option value="operationsManager">Operations Manager</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="experience-select">Experience</label>
                    <select id="experience-select" onchange="loadTemplateData()">
                        <option value="">Choose level...</option>
                        <option value="fresher">Fresher (0-2 years)</option>
                        <option value="junior">Junior (2-4 years)</option>
                        <option value="midLevel">Mid-Level (4-7 years)</option>
                        <option value="senior">Senior (7-10 years)</option>
                        <option value="lead">Lead (10-12 years)</option>
                        <option value="manager">Manager (12-15 years)</option>
                        <option value="director">Director (15+ years)</option>
                        <option value="executive">Executive (20+ years)</option>
                    </select>
                </div>
            </div>
            
            <div class="accordion-section active" id="personal-section">
                <div class="accordion-header" onclick="toggleAccordion('personal-section')">
                    <span><span class="icon">👤</span> Personal</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="accordion-content">
                    <div class="accordion-content-inner">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="full-name" placeholder="John Doe" oninput="updateResume()">
                        </div>
                        <div class="form-group">
                            <label>Job Title</label>
                            <input type="text" id="job-title" placeholder="Software Engineer" oninput="updateResume()">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" placeholder="john@email.com" oninput="updateResume()">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="phone" placeholder="(555) 123-4567" oninput="updateResume()">
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" id="location" placeholder="San Francisco, CA" oninput="updateResume()">
                        </div>
                        <div class="form-group">
                            <label>LinkedIn</label>
                            <input type="text" id="linkedin" placeholder="linkedin.com/in/johndoe" oninput="updateResume()">
                        </div>
                        <div class="form-group">
                            <label>Summary</label>
                            <textarea id="summary" placeholder="Professional summary..." oninput="updateResume()"></textarea>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="accordion-section" id="experience-section">
                <div class="accordion-header" onclick="toggleAccordion('experience-section')">
                    <span><span class="icon">💼</span> Experience</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="accordion-content">
                    <div class="accordion-content-inner">
                        <div class="entry-list" id="experience-list"></div>
                        <button class="add-btn" onclick="addExperience()">+ Add</button>
                    </div>
                </div>
            </div>
            
            <div class="accordion-section" id="education-section">
                <div class="accordion-header" onclick="toggleAccordion('education-section')">
                    <span><span class="icon">🎓</span> Education</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="accordion-content">
                    <div class="accordion-content-inner">
                        <div class="entry-list" id="education-list"></div>
                        <button class="add-btn" onclick="addEducation()">+ Add</button>
                    </div>
                </div>
            </div>
            
            <div class="accordion-section" id="skills-section">
                <div class="accordion-header" onclick="toggleAccordion('skills-section')">
                    <span><span class="icon">⚡</span> Skills</span>

            <div class="accordion-section" id="projects-section">

            <div class="accordion-section" id="certifications-section">

                            <label>Certifications (comma separated)</label>

            <div class="accordion-section" id="achievements-section">

                <div class="accordion-content">
                    <div class="accordion-content-inner">
                        <div class="form-group">
                            <label>Achievements (one per line)</label>
                            <textarea id="achievements-input" placeholder="Employee of the Year 2023&#10;Published 3 technical articles&#10;Speaker at tech conferences" oninput="updateAchievements()"></textarea>

                    </div>
                </div>

            <div class="download-buttons">
                <button class="download-btn word" onclick="downloadWord()">📄 Word</button>
                <button class="download-btn pdf" onclick="downloadPDF()">📑 PDF</button>

        <div class="preview-area">
            <div class="preview-header">
                <h2>📄 Live Preview</h2>
            </div>
            <div id="resume-preview"></div>
        </div>
        
        <div class="right-sidebar expanded" id="rightSidebar">
            <h3>🎨 Layouts</h3>
            <div class="layout-grid">
                <button class="layout-btn active" onclick="setLayout('modern')">Modern</button>
                <button class="layout-btn" onclick="setLayout('ats')">ATS</button>
                <button class="layout-btn" onclick="setLayout('executive')">Exec</button>
                <button class="layout-btn" onclick="setLayout('twoColumn')">2-Col</button>
                <button class="layout-btn" onclick="setLayout('creative')">Creative</button>
                <button class="layout-btn" onclick="setLayout('minimal')">Minimal</button>
                <button class="layout-btn" onclick="setLayout('classic')">Classic</button>
                <button class="layout-btn" onclick="setLayout('elegant')">Elegant</button>
                <button class="layout-btn" onclick="setLayout('bold')">Bold</button>
                <button class="layout-btn" onclick="setLayout('clean')">Clean</button>
                <button class="layout-btn" onclick="setLayout('dark')">Dark</button>
                <button class="layout-btn" onclick="setLayout('neon')">Neon</button>
                <button class="layout-btn" onclick="setLayout('glassmorphism')">Glass</button>
                <button class="layout-btn" onclick="setLayout('geometric')">Geo</button>
                <button class="layout-btn" onclick="setLayout('vibrant')">Vibrant</button>
                <button class="layout-btn" onclick="setLayout('techMinimal')">Tech</button>
                <button class="layout-btn" onclick="setLayout('pastel')">Pastel</button>
                <button class="layout-btn" onclick="setLayout('gradientBorder')">Grad</button>

                <button class="layout-btn" onclick="setLayout('cyberpunk')">Cyber</button>

    </div>
    
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('sidebarToggle');
            
            if (sidebar.classList.contains('expanded')) {
                sidebar.classList.remove('expanded');
                sidebar.classList.add('collapsed');
                toggle.textContent = '☰';
            } else {
                sidebar.classList.remove('collapsed');
                sidebar.classList.add('expanded');
                toggle.textContent = '✕';
            }
        }
        
        function toggleLayoutSidebar() {
            const rightSidebar = document.getElementById('rightSidebar');
            const toggle = document.getElementById('layoutToggle');
            
            if (rightSidebar.classList.contains('expanded')) {
                rightSidebar.classList.remove('expanded');
                rightSidebar.classList.add('collapsed');
                toggle.textContent = '🎨';
            } else {
                rightSidebar.classList.remove('collapsed');
                rightSidebar.classList.add('expanded');
                toggle.textContent = '✕';
            }
        }
        
        function toggleAccordion(sectionId) {
            const section = document.getElementById(sectionId);
            const allSections = document.querySelectorAll('.accordion-section');
            
            // Close all other sections
            allSections.forEach(s => {
                if (s.id !== sectionId) {
                    s.classList.remove('active');
                }
            });
            
            // Toggle current section
            section.classList.toggle('active');
        }
        
        let resumeData = {
            name: '',
            title: '',
            email: '',
            phone: '',
            location: '',
            linkedin: '',
            summary: '',
            skills: [],
            experience: [],
            education: [],
            projects: [],
            certifications: [],
            achievements: []
        };
        
        let currentLayout = 'modern';
        let currentRole = '';
        let currentExperience = '';
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Check for URL parameters for auto-selection
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('role')) {
                document.getElementById('role-select').value = urlParams.get('role');
                currentRole = urlParams.get('role');
            }
            if (urlParams.get('experience')) {
                document.getElementById('experience-select').value = urlParams.get('experience');
                currentExperience = urlParams.get('experience');
            }
            if (urlParams.get('layout')) {
                currentLayout = urlParams.get('layout');
                updateLayoutButtons(currentLayout);
            }
            
            // Load template data if role/experience selected
            if (currentRole && currentExperience) {
                loadTemplateData();
            }
            
            // Generate initial resume
            updateResume();
        });
        
        function loadTemplateData() {
            currentRole = document.getElementById('role-select').value;
            currentExperience = document.getElementById('experience-select').value;
            
            if (currentRole && resumeTemplates[currentRole]) {
                const roleData = resumeTemplates[currentRole];
                let templateData;
                
                if (currentExperience && roleData[currentExperience]) {
                    templateData = roleData[currentExperience];
                } else if (roleData.senior) {
                    templateData = roleData.senior;
                } else if (Object.keys(roleData)[0]) {
                    templateData = roleData[Object.keys(roleData)[0]];
                }
                
                if (templateData) {
                    // Populate form fields with template data
                    document.getElementById('full-name').value = templateData.name || '';
                    document.getElementById('job-title').value = templateData.title || '';
                    document.getElementById('email').value = templateData.email || 'alex.johnson@email.com';
                    document.getElementById('phone').value = templateData.phone || '(555) 123-4567';
                    document.getElementById('location').value = templateData.location || 'San Francisco, CA';
                    document.getElementById('linkedin').value = templateData.linkedin || 'linkedin.com/in/alexjohnson';
                    document.getElementById('summary').value = templateData.summary || '';
                    document.getElementById('skills-input').value = templateData.skills ? templateData.skills.join(', ') : '';
                    document.getElementById('certifications-input').value = templateData.certifications ? templateData.certifications.join(', ') : '';
                    document.getElementById('achievements-input').value = templateData.achievements ? templateData.achievements.join('\n') : '';
                    
                    // Clear and populate experience
                    document.getElementById('experience-list').innerHTML = '';
                    if (templateData.experience && templateData.experience.length > 0) {
                        templateData.experience.forEach(exp => {
                            addExperience(exp);
                        });
                    }
                    
                    // Clear and populate education
                    document.getElementById('education-list').innerHTML = '';
                    if (templateData.education) {
                        if (Array.isArray(templateData.education)) {
                            templateData.education.forEach(edu => {
                                addEducation(edu);
                            });
                        } else if (templateData.education.degree) {
                            addEducation({
                                degree: templateData.education.degree,
                                school: templateData.education.school || '',
                                location: templateData.education.location || '',
                                date: templateData.education.date || ''
                            });
                        }
                    }
                    
                    // Clear and populate projects
                    document.getElementById('projects-list').innerHTML = '';
                    if (templateData.projects && templateData.projects.length > 0) {
                        templateData.projects.forEach(proj => {
                            addProject(proj);
                        });
                    }
                    
                    updateResume();
                }
            }
        }
        
        function updateResume() {
            console.log('updateResume called, currentLayout:', currentLayout);
            // Collect data from form
            resumeData.name = document.getElementById('full-name').value || 'Your Name';
            resumeData.title = document.getElementById('job-title').value || 'Your Title';
            resumeData.email = document.getElementById('email').value || 'email@example.com';
            resumeData.phone = document.getElementById('phone').value || '(555) 123-4567';
            resumeData.location = document.getElementById('location').value || 'Your Location';
            resumeData.linkedin = document.getElementById('linkedin').value || 'linkedin.com/in/yourname';
            resumeData.summary = document.getElementById('summary').value || 'Your professional summary will appear here.';
            
            // Collect experience
            resumeData.experience = [];
            document.querySelectorAll('.experience-entry').forEach(entry => {
                resumeData.experience.push({
                    title: entry.querySelector('.exp-title').value,
                    company: entry.querySelector('.exp-company').value,
                    location: entry.querySelector('.exp-location').value,
                    date: entry.querySelector('.exp-date').value,
                    description: entry.querySelector('.exp-description').value.split('\n')
                });
            });
            
            // Collect education
            resumeData.education = [];
            document.querySelectorAll('.education-entry').forEach(entry => {
                resumeData.education.push({
                    degree: entry.querySelector('.edu-degree').value,
                    school: entry.querySelector('.edu-school').value,
                    location: entry.querySelector('.edu-location').value,
                    date: entry.querySelector('.edu-date').value
                });
            });
            
            // Collect projects
            resumeData.projects = [];
            document.querySelectorAll('.project-entry').forEach(entry => {
                resumeData.projects.push({
                    title: entry.querySelector('.proj-title').value,
                    description: entry.querySelector('.proj-description').value
                });
            });
            
            // Collect skills
            const skillsInput = document.getElementById('skills-input').value;
            resumeData.skills = skillsInput ? skillsInput.split(',').map(s => s.trim()) : [];
            
            // Collect certifications
            const certsInput = document.getElementById('certifications-input').value;
            resumeData.certifications = certsInput ? certsInput.split(',').map(c => c.trim()) : [];
            
            // Collect achievements
            const achieveInput = document.getElementById('achievements-input').value;
            resumeData.achievements = achieveInput ? achieveInput.split('\n').map(a => a.trim()).filter(a => a) : [];
            
            // Generate preview
            const preview = document.getElementById('resume-preview');
            const html = generateResumeHTML(resumeData, currentLayout);
            console.log('Generated HTML, length:', html.length);
            preview.innerHTML = html;
            console.log('Preview updated');
        }
        
        function updateSkills() {
            const skillsInput = document.getElementById('skills-input').value;
            resumeData.skills = skillsInput.split(',').map(s => s.trim()).filter(s => s);
            updateResume();
        }
        
        function updateCertifications() {
            const certsInput = document.getElementById('certifications-input').value;
            resumeData.certifications = certsInput.split(',').map(c => c.trim()).filter(c => c);
            updateResume();
        }
        
        function updateAchievements() {
            const achievementsInput = document.getElementById('achievements-input').value;
            resumeData.achievements = achievementsInput.split('\n').map(a => a.trim()).filter(a => a);
            updateResume();
        }
        
        function addExperience(existingData = null) {
            const experienceList = document.getElementById('experience-list');
            const entryDiv = document.createElement('div');
            entryDiv.className = 'entry-item experience-entry';
            entryDiv.innerHTML = `
                <button class="remove-btn" onclick="this.parentElement.remove(); updateResume()">✕</button>
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" class="exp-title" placeholder="Software Engineer" value="${existingData ? existingData.title : ''}" oninput="updateResume()">
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" class="exp-company" placeholder="Company Name" value="${existingData ? existingData.company : ''}" oninput="updateResume()">
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" class="exp-location" placeholder="City, State" value="${existingData ? existingData.location : ''}" oninput="updateResume()">
                </div>
                <div class="form-group">
                    <label>Date Range</label>
                    <input type="text" class="exp-date" placeholder="January 2020 - Present" value="${existingData ? existingData.date : ''}" oninput="updateResume()">
                </div>
                <div class="form-group">
                    <label>Description (one per line)</label>
                    <textarea class="exp-description" placeholder="• Led development of microservices&#10;• Reduced load time by 40%&#10;• Mentored team of 5 developers" oninput="updateResume()">${existingData ? existingData.description.join('\n') : ''}</textarea>
                </div>
            `;
            experienceList.appendChild(entryDiv);
            if (!existingData) updateResume();
        }
        
        function addEducation(existingData = null) {
            const educationList = document.getElementById('education-list');
            const entryDiv = document.createElement('div');
            entryDiv.className = 'entry-item education-entry';
            entryDiv.innerHTML = `
                <button class="remove-btn" onclick="this.parentElement.remove(); updateResume()">✕</button>
                <div class="form-group">
                    <label>Degree</label>
                    <input type="text" class="edu-degree" placeholder="Bachelor of Science in Computer Science" value="${existingData ? existingData.degree : ''}" oninput="updateResume()">
                </div>
                <div class="form-group">
                    <label>Institution</label>
                    <input type="text" class="edu-school" placeholder="University Name" value="${existingData ? existingData.school : ''}" oninput="updateResume()">
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" class="edu-location" placeholder="City, State" value="${existingData ? existingData.location : ''}" oninput="updateResume()">
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="text" class="edu-date" placeholder="Graduated May 2020" value="${existingData ? existingData.date : ''}" oninput="updateResume()">
                </div>
            `;
            educationList.appendChild(entryDiv);
            if (!existingData) updateResume();
        }
        
        function addProject(existingData = null) {
            const projectsList = document.getElementById('projects-list');
            const entryDiv = document.createElement('div');
            entryDiv.className = 'entry-item project-entry';
            entryDiv.innerHTML = `
                <button class="remove-btn" onclick="this.parentElement.remove(); updateResume()">✕</button>
                <div class="form-group">
                    <label>Project Name</label>
                    <input type="text" class="proj-title" placeholder="E-commerce Platform" value="${existingData ? existingData.title : ''}" oninput="updateResume()">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea class="proj-description" placeholder="Full-stack e-commerce platform built with MERN stack..." oninput="updateResume()">${existingData ? existingData.description : ''}</textarea>
                </div>
            `;
            projectsList.appendChild(entryDiv);
            if (!existingData) updateResume();
        }
        
        function setLayout(layout) {
            currentLayout = layout;
            updateLayoutButtons(layout);
            updateResume();
        }
        
        function updateLayoutButtons(layout) {
            document.querySelectorAll('.layout-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.layout-btn').forEach(btn => {
                if (btn.textContent.toLowerCase().includes(layout.replace('column', '-col'))) {
                    btn.classList.add('active');
                }
            });
        }
        
        function generateResumeHTML(data, layout) {
            const layouts = {
                modern: generateModernLayout,
                ats: generateATSLayout,
                executive: generateExecutiveLayout,
                twoColumn: generateTwoColumnLayout,
                creative: generateCreativeLayout,
                minimal: generateMinimalLayout,
                classic: generateClassicLayout,
                elegant: generateElegantLayout,
                bold: generateBoldLayout,
                clean: generateCleanLayout,
                dark: generateDarkLayout,
                neon: generateNeonLayout,
                glassmorphism: generateGlassmorphismLayout,
                geometric: generateGeometricLayout,
                vibrant: generateVibrantLayout,
                techMinimal: generateTechMinimalLayout,
                pastel: generatePastelLayout,
                gradientBorder: generateGradientBorderLayout,
                cardBased: generateCardBasedLayout,
                cyberpunk: generateCyberpunkLayout
            };
            
            return layouts[layout] ? layouts[layout](data) : generateModernLayout(data);
        }
        
        function saveResume() {
            localStorage.setItem('resumeDraft', JSON.stringify(resumeData));
            localStorage.setItem('resumeLayout', currentLayout);
            alert('Resume draft saved successfully!');
        }
        
        function loadResume() {
            const savedData = localStorage.getItem('resumeDraft');
            const savedLayout = localStorage.getItem('resumeLayout');
            
            if (savedData) {
                resumeData = JSON.parse(savedData);
                
                // Populate form fields
                document.getElementById('full-name').value = resumeData.name || '';
                document.getElementById('job-title').value = resumeData.title || '';
                document.getElementById('email').value = resumeData.email || '';
                document.getElementById('phone').value = resumeData.phone || '';
                document.getElementById('location').value = resumeData.location || '';
                document.getElementById('linkedin').value = resumeData.linkedin || '';
                document.getElementById('summary').value = resumeData.summary || '';
                document.getElementById('skills-input').value = resumeData.skills ? resumeData.skills.join(', ') : '';
                document.getElementById('certifications-input').value = resumeData.certifications ? resumeData.certifications.join(', ') : '';
                document.getElementById('achievements-input').value = resumeData.achievements ? resumeData.achievements.join('\n') : '';
                
                // Clear and populate experience
                document.getElementById('experience-list').innerHTML = '';
                if (resumeData.experience) {
                    resumeData.experience.forEach(exp => {
                        addExperience(exp);
                    });
                }
                
                // Clear and populate education
                document.getElementById('education-list').innerHTML = '';
                if (resumeData.education) {
                    resumeData.education.forEach(edu => {
                        addEducation(edu);
                    });
                }
                
                // Clear and populate projects
                document.getElementById('projects-list').innerHTML = '';
                if (resumeData.projects) {
                    resumeData.projects.forEach(proj => {
                        addProject(proj);
                    });
                }
                
                if (savedLayout) {
                    currentLayout = savedLayout;
                    updateLayoutButtons(currentLayout);
                }
                
                updateResume();
                alert('Resume draft loaded successfully!');
            } else {
                alert('No saved draft found.');
            }
        }
        
        function generateModernLayout(data) {
            const skillsArray = Array.isArray(data.skills) ? data.skills : (data.skills ? data.skills.split(', ') : []);
            const expArray = Array.isArray(data.experience) ? data.experience : [];
            const projArray = Array.isArray(data.projects) ? data.projects : [];
            const eduArray = Array.isArray(data.education) ? data.education : (data.education && data.education.degree ? [data.education] : []);
            const certArray = Array.isArray(data.certifications) ? data.certifications : (data.certifications ? data.certifications.split(', ') : []);
            const achieveArray = Array.isArray(data.achievements) ? data.achievements : (data.achievements ? data.achievements.split('\n') : []);
            
            return `
                <div style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.6; color: #1f2937; max-width: 850px; margin: 0 auto; padding: 50px; background: #ffffff; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);">
                    <div style="margin-bottom: 40px; padding-bottom: 30px; border-bottom: 2px solid #e5e7eb;">
                        <div style="font-size: 32px; font-weight: 700; margin-bottom: 8px; color: #111827; letter-spacing: -0.025em;">${data.name}</div>
                        <div style="font-size: 18px; color: #6366f1; margin-bottom: 20px; font-weight: 500;">${data.title}</div>
                        <div style="font-size: 14px; color: #6b7280; display: flex; gap: 20px; flex-wrap: wrap; align-items: center;">
                            <span style="display: flex; align-items: center; gap: 6px;">📧 ${data.email}</span>
                            <span style="display: flex; align-items: center; gap: 6px;">📱 ${data.phone}</span>
                            <span style="display: flex; align-items: center; gap: 6px;">📍 ${data.location}</span>
                            <span style="display: flex; align-items: center; gap: 6px;">🔗 ${data.linkedin}</span>
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 35px;">
                        <div style="font-size: 14px; font-weight: 600; margin-bottom: 15px; color: #374151; text-transform: uppercase; letter-spacing: 0.05em;">Professional Summary</div>
                        <div style="font-size: 15px; line-height: 1.7; color: #4b5563;">${data.summary}</div>
                    </div>
                    
                    ${skillsArray.length > 0 ? `
                    <div style="margin-bottom: 35px;">
                        <div style="font-size: 14px; font-weight: 600; margin-bottom: 15px; color: #374151; text-transform: uppercase; letter-spacing: 0.05em;">Skills</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                            ${skillsArray.map(skill => `<div style="font-size: 13px; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); color: white; padding: 8px 16px; border-radius: 8px; font-weight: 500;">${skill}</div>`).join('')}
                        </div>
                    </div>
                    ` : ''}
                    
                    ${expArray.length > 0 ? `
                    <div style="margin-bottom: 35px;">
                        <div style="font-size: 14px; font-weight: 600; margin-bottom: 15px; color: #374151; text-transform: uppercase; letter-spacing: 0.05em;">Experience</div>
                        ${expArray.map(exp => `
                            <div style="margin-bottom: 25px; padding-left: 20px; border-left: 3px solid #6366f1;">
                                <div style="font-weight: 600; font-size: 16px; color: #111827; margin-bottom: 4px;">${exp.title}</div>
                                <div style="font-weight: 500; color: #6366f1; margin-bottom: 6px; font-size: 14px;">${exp.company} | ${exp.location}</div>
                                <div style="font-size: 13px; color: #9ca3af; margin-bottom: 12px; font-weight: 500;">${exp.date}</div>
                                <div style="font-size: 14px; line-height: 1.7; color: #4b5563;">
                                    <ul style="margin-left: 20px; margin-top: 8px;">
                                        ${(Array.isArray(exp.description) ? exp.description : []).map(desc => `<li style="margin-bottom: 6px;">${desc}</li>`).join('')}
                                    </ul>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    ` : ''}
                    
                    ${projArray.length > 0 ? `
                    <div style="margin-bottom: 35px;">
                        <div style="font-size: 14px; font-weight: 600; margin-bottom: 15px; color: #374151; text-transform: uppercase; letter-spacing: 0.05em;">Projects</div>
                        ${projArray.map(proj => `
                            <div style="margin-bottom: 20px; padding-left: 20px; border-left: 3px solid #6366f1;">
                                <div style="font-weight: 600; font-size: 16px; color: #111827; margin-bottom: 4px;">${proj.title}</div>
                                <div style="font-size: 14px; line-height: 1.7; color: #4b5563;">${proj.description}</div>
                            </div>
                        `).join('')}
                    </div>
                    ` : ''}
                    
                    ${eduArray.length > 0 ? `
                    <div style="margin-bottom: 35px;">
                        <div style="font-size: 14px; font-weight: 600; margin-bottom: 15px; color: #374151; text-transform: uppercase; letter-spacing: 0.05em;">Education</div>

        function downloadWord() {
            try {
                console.log('Starting Word download...');
                console.log('resumeData:', resumeData);
                
                // Ensure resumeData has content
                if (!resumeData.name) {
                    alert('Please fill in at least your name before downloading.');
                    return;
                }
                
                // Get the preview HTML content which already has the layout styling
                const previewElement = document.getElementById('resume-preview');
                const htmlContent = previewElement.innerHTML;
                
                // Create HTML content for Word document with the same styling as preview
                const wordContent = `
                    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word'>
                    <head>
                        <meta charset="utf-8">
                        <title>Resume - ${resumeData.name}</title>
                        <style>
                            body { 
                                font-family: Arial, sans-serif; 
                                line-height: 1.5; 
                                color: #000; 
                                margin: 0;
                                padding: 20px;
                            }
                            * {
                                box-sizing: border-box;
                            }
                        </style>
                    </head>
                    <body>
                        ${htmlContent}
                    </body>
                    </html>
                `;
                
                // Create blob with Word MIME type
                const blob = new Blob(['\ufeff', wordContent], {
                    type: 'application/msword'
                });
                
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `resume-${resumeData.name.replace(/\s+/g, '-').toLowerCase() || 'custom'}.doc`;
                link.click();
                URL.revokeObjectURL(url);
                
                console.log('Word download completed');
            } catch (error) {
                console.error('Word download error:', error);
                alert('Error: ' + error.message + '. Please refresh the page and try again.');
            }
        }

            };
            
            html2pdf().set(opt).from(element).save().catch(error => {
                console.error('Error generating PDF:', error);
                alert('Error generating PDF. Please try again.');
            });
        }
    </script>
</body>
</html>
